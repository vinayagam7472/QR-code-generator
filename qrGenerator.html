<!DOCTYPE html>
<html>

<head>
    <title>QR Generator</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #ffffff;
            padding: 25px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid #ddd;
        }

        h2 {
            color: #333;
        }

        input {
            padding: 8px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        input:focus {
            border-color: #007bff;
        }

        button {
            padding: 8px 12px;
            margin-left: 8px;
            border: none;
            background-color: #007bff;
            color: white;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        img {
            margin-top: 15px;
            border: 1px solid #ccc;
            padding: 5px;
        }

        #enter {
            color: red;
            margin-top: 8px;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>QR Code Generator</h2>

        <input type="text" id="text" placeholder="Enter text">
        <button onclick="generateQR()">Submit</button>

        <br><br>
        <img id="qr">
        <p id="enter"></p>
    </div>

    <script>
        function generateQR() {
            let text = document.getElementById("text").value;
            let value = document.getElementById("enter");

            if (text === "") {
                value.innerText = "Enter something";
                return;
            }

            value.innerText = "";

            let url = "https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=" + encodeURIComponent(text);

            document.getElementById("qr").src = url;
        }
    </script>

</body>

</html>
